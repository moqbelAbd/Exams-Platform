<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/common-js/main.js" defer></script>

  <link rel="stylesheet" href="student-dashboard.css">

</head>
<body>
   <header id="page-header"></header>

    <div id="user-profile"></div>

    <main>
        <h1>Student Dashboard</h1>
        <p>Welcome back, (full name)</p>

        <div class="cards-container">
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-regular fa-file-lines"></i>                
                </div>
                <p class="card-counter">1</p>
                <p class="card-title">Available Exams</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-regular fa-circle-check"></i>
                </div>
                <p class="card-counter">2</p>
                <p class="card-title">Completed Exams</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-solid fa-award"></i>
                </div>
                <p class="card-counter">2</p>
                <p class="card-title">Exams Passed</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>
                <p class="card-counter">100%</p>
                <p class="card-title">Pass Rate</p>
            </div>
            
        </div>

        <div class="tabs">
            <button class="active-tab">Available Exams</button>
            <button class="inactive-tab">Exam History</button>
        </div>

        <div class="searchbox-container">
            <div class="searchbox">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search exams...">
            </div>
            
        </div>

        <div class="available-table .table-container">
            <table>
                <thead>
                    <th>Title</th>
                    <th>Questions</th>
                    <th>TOTAL GRADE</th>
                    <th>ACTIONS</th>
                    <th></th>
                </thead>
                <tbody>

                            </button>
                        </td>

            </table>
        </div>

        <div class="history-table .table-container">
            <table>
                <thead>
                    <th>Full Name</th>
                    <th>Username</th>
                    <th>National ID</th>
                    <th>Actions</th>
                </thead>
