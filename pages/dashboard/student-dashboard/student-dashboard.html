    <title>Student Dashboard</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">

<body>
   <header id="page-header"></header>

    <div id="user-profile"></div>

    <main>
        <h1>Student Dashboard</h1>
        <p>Welcome back, <span class="student_name"></span></p>

        <div class="cards-container">
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-regular fa-file-lines"></i>                
                </div>
                <p class="card-counter">3</p>
                <p class="card-title">Available Exams</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-regular fa-circle-check"></i>
                </div>
                <p class="card-counter">7</p>
                <p class="card-title">Completed Exams</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-solid fa-award"></i>
                </div>
                <p class="card-counter">3</p>
                <p class="card-title">Exams Passed</p>
            </div>
            <div class="card">
                <div class="icon-bg">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>
                <p class="card-counter">45%</p>
                <p class="card-title">Pass Rate</p>
            </div>
            
        </div>

        <div class="tabs">
            <button class="active-tab">Available Exams</button>
            <button class="inactive-tab">Exam History</button>
        </div>

        <div class="searchbox-container">
            <div class="searchbox">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search exams...">
            </div>
            
        </div>

        <div class="available-table table-container">
            <table>
                <thead>
                    <th>Title</th>
                    <th>Questions</th>
                    <th>TOTAL GRADE</th>
                    <th>ACTIONS</th>
                </thead>
                <tbody>

                            </button>

        </div>

        <div class="history-table table-container inactive-table">
            <table>
                <thead>
                    <th>Title</th>
                    <th>Questions</th>
                    <th>TOTAL GRADE</th>
                    <th>Your GRADE</th>

                </thead>
