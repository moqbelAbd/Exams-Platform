<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Attempts</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/styles/header.css">
    
    <script type="module" src="/common-js/main.js" defer></script>
    
    <link rel="stylesheet" href="exam-attempts.css">
    <link rel="stylesheet" href="add-student/add-student.css">
    <script src="exam-attempts.js" defer></script>
</head>

<body>
    <header id="page-header"></header>

    <div id="user-profile"></div>

    <main>
        <h1></h1>
        <p>Exam Attempts — 1 submission(s)</p>

        <div class="cards-container">
            <div class="card">
                <p class="card-counter">1</p>
                <p class="card-title">Total Attempts</p>
            </div>
            <div class="card">
                <p class="card-counter"><span class="passed">1</span></p>
                <p class="card-title">Passed</p>
            </div>
            <div class="card">
                <p class="card-counter">1</p>
                <p class="card-title">Total Grade</p>
            </div>
        </div>


        <div class="exams-table table-container">
            <table>
                <thead>
                    <th>Student Name</th>
                    <th>Grade</th>
                    <th>Out Of</th>
                    <th>Result</th>
                    <th>Submitted</th>
                    <th></th>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

    </main>

</body>
</html>
