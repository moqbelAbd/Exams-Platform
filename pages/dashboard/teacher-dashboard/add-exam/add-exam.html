<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../../../../styles/variables.css">
    <link rel="stylesheet" href="../../../../styles/header.css">
    <link rel="stylesheet" href="add-exam.css">
    
    <script src="/common-js/main.js" type="module"></script>
    <script src="add-exam.js" defer></script>




    <title>Add Exam</title>
</head>
<body>
    <header id="page-header"></header>
    <main class="add-exam-page">
        <div class="page-header-bar">
            <button class="back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h1>Add exam</h1>
                <p>create a new exam</p>
            </div>
        </div>


        <div class="exam-card">
            <div class="form">
                <label for="exam-title">exam title</label>
                <input type="text" id="exam-title" class="form-input">
            </div>
        </div>


        <div class="que-container"></div>
            <button class="add-question-btn" id="add-question-btn">
                <i class="fa-solid fa-plus"></i>
            </button>

            <div class="action">
                <button class="btn-save" id="save-btn">save exam</button>
                <button class="btn-cancel" id="cancel-btn">cancel</button>
            </div>
    
    </main>
    <div id="user-profile"></div>
</body>
</html>
