                <div class="icon-bg">
                    <svg class="attempts-icon card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-no-axes-column w-4 h-4 text-orange-600" data-fg-d3bl258="0.8:66.2977:/src/app/App.tsx:772:15:35817:43:e:s.icon" data-fgid-d3bl258=":r41:"><line x1="18" x2="18" y1="20" y2="10"></line><line x1="12" x2="12" y1="20" y2="4"></line><line x1="6" x2="6" y1="20" y2="14"></line></svg>

            <button>Students</button>
        </div>

</html>
